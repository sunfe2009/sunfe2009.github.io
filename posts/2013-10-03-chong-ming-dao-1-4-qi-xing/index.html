    <script>
      function setTheme() {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.body.classList.add('dark');
          return;
        }

        const time = new Date();
        const prev = localStorage.getItem('date');
        const date = String(time.getMonth() + 1) + '.' + String(time.getDate());

        const now = time.getTime();
        let sunrise;
        let sunset;

        function setBodyClass() {
          if (now > sunrise && now < sunset) return;
          document.body.classList.add('dark');
        }

        if (date !== prev) {
          fetch('https://api.ipgeolocation.io/astronomy?apiKey=5ed37d85103e4defa5df4c5298ed5215')
            .then((res) => res.json())
            .then((data) => {
              sunrise = data.sunrise.split(':').map(Number);
              sunset = data.sunset.split(':').map(Number);
            })
            .catch(() => {
              sunrise = [7, 0];
              sunset = [19, 0];
            })
            .finally(() => {
              sunrise = time.setHours(sunrise[0], sunrise[1], 0);
              sunset = time.setHours(sunset[0], sunset[1], 0);
              setBodyClass();
              localStorage.setItem('sunrise', sunrise);
              localStorage.setItem('sunset', sunset);
            });
          localStorage.setItem('date', date);
        } else {
          sunrise = Number(localStorage.getItem('sunrise'));
          sunset = Number(localStorage.getItem('sunset'));
          setBodyClass();
        }
      }
    </script>

  <div class="post-content"><p>抽出了国庆长假中的两天，准备去所谓的中国第三大岛转转。</p>

<p><img src="https://tva1.sinaimg.cn/large/0082zybpgy1gcav3iopvmj30dw0993ye.jpg" alt="" /></p>

<p>第一天早上，坐车穿过长江大桥，浓雾下透视窗外。</p>

<p><img src="https://tva1.sinaimg.cn/large/0082zybpgy1gcav3z4h4kj30dw099gln.jpg" alt="" /></p>

<p>第二天的早上，沿渠小道，悠远而神秘。</p>

<p><img src="https://tva1.sinaimg.cn/large/0082zybpgy1gcav4d2iicj30dw099mxb.jpg" alt="" /></p>

<p>蓝天，枯树、黄稻，完美的“Z”字型。</p>

<p><img src="https://tva1.sinaimg.cn/large/0082zybpgy1gcav4ocibtj30dw099aa1.jpg" alt="" /></p>

<p>继续前行，至中午，天蓝云粹，开阔视野爽爆双眼。</p>

<p><img src="https://tva1.sinaimg.cn/large/0082zybpgy1gcav50yn6vj30dw099a9y.jpg" alt="" /></p>

<p>忍不住再框一张。</p>

<p><img src="https://tva1.sinaimg.cn/large/0082zybpgy1gcav565y7gj30dw099dg2.jpg" alt="" /></p>

<p>下午，至西沙湿地，芦苇海洋中瞥见一亭。傍晚颜色和早上的颜色是呼应的呢！</p>
